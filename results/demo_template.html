<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Madness of People Is Quantum — Quantum Option Pricer</title>
<style>
  :root{
    --bg:#0b1020;--ink:#eaf0ff;--muted:#9fb0d4;--line:#2a3760;
    --quantum:#2a6f97;--classical:#c44536;--accent:#2a9d8f;--gt:#e0b341;--pale:#8d99ae;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden}
  #stage{height:100vh;display:flex;align-items:center;justify-content:center;padding:5vh 6vw 9vh}
  .beat{display:none;width:100%;max-width:1120px}
  .beat.live{display:block}
  .beat.live .fade{animation:fade .55s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .kicker{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px}
  h1{font-size:32px;line-height:1.15;margin:0 0 10px;font-weight:800;
    background:linear-gradient(135deg,#6fd0e8,#2a9d8f);-webkit-background-clip:text;background-clip:text;color:transparent}
  h1.plain{background:none;color:var(--ink)}
  .cap{color:var(--muted);font-size:15px;max-width:820px;line-height:1.55}
  .cap b{color:var(--ink)} .num{color:var(--gt);font-weight:700}
  .figcard{background:#fff;border-radius:14px;padding:12px;margin-top:14px;box-shadow:0 10px 40px #0006}
  .figcard img{display:block;width:100%;height:auto;border-radius:6px}
  .reveal img{clip-path:inset(0 100% 0 0)}
  .beat.live .reveal img{animation:wipe 1.1s .25s cubic-bezier(.6,0,.2,1) forwards}
  @keyframes wipe{to{clip-path:inset(0 0 0 0)}}
  canvas{display:block;width:100%;height:auto;border-radius:6px}
  #nav{position:fixed;bottom:16px;left:0;right:0;text-align:center;color:var(--muted);font-size:12.5px}
  #dots{margin-bottom:6px}
  #dots span{display:inline-block;width:9px;height:9px;border-radius:50%;background:#33406a;margin:0 4px;transition:.3s}
  #dots span.on{background:var(--accent);transform:scale(1.25)}
  kbd{background:#1c2950;border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:var(--ink);font-size:11px}
  #cockpit{display:none}
  #cockpit.live{display:block;width:100%;max-width:1180px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .panel{background:#fff;border-radius:12px;padding:10px}
  .panel .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#5a6b8c;margin:2px 4px 6px}
  .panel img{width:100%;height:auto;border-radius:6px;display:block}
  .badge{display:inline-block;font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px}
  .notice{position:fixed;top:12px;left:12px;right:12px;background:#3a1f1f;color:#ffb4b4;border:1px solid #6b2b2b;
    border-radius:8px;padding:9px 14px;font-size:13px;display:none}
</style>
</head>
<body>
<div class="notice" id="notice"></div>
<div id="stage">
  <section class="beat" data-beat="0"></section>
  <section class="beat" data-beat="1"></section>
  <section class="beat" data-beat="2"></section>
  <section class="beat" data-beat="3"></section>
  <section class="beat" data-beat="4"></section>
  <section class="beat" data-beat="5"></section>
  <div id="cockpit"></div>
</div>
<div id="nav"><div id="dots"></div>
  <div><kbd>←</kbd> <kbd>→</kbd>/<kbd>space</kbd> move · <kbd>R</kbd> replay · <kbd>E</kbd> cockpit · <kbd>P</kbd> autoplay</div></div>

<script>
// ===== injected by results/build_demo.py (self-contained, no fetch) =====
const DATA = /*__DATA__*/ null;
const FIGS = /*__FIGS__*/ {};
// ========================================================================

let BEAT = 0, COCKPIT = false, AUTOPLAY = false, autoTimer = null, raf = null;
const BEATS_EL = document.querySelectorAll('.beat');
const N = BEATS_EL.length;
const fc = () => (DATA && DATA.forecast) || null;
const cv = () => (DATA && DATA.convergence) || null;
const rs = () => (DATA && DATA.results) || null;
const hw = () => (DATA && DATA.hardware) || {status:'pending', backend:'Q50'};
const img = (name) => FIGS[name]
  ? '<img alt="'+name+'" src="'+FIGS[name]+'">'
  : '<div style="padding:60px;text-align:center;color:#789;font-family:monospace">['+name
    +'.png — run build_demo.py]</div>';

// ---------- canvas helpers ----------
function setupCanvas(el, w, h){
  const c=document.createElement('canvas'); const dpr=Math.min(window.devicePixelRatio||1,2);
  c.width=w*dpr; c.height=h*dpr; c.style.aspectRatio=w+'/'+h;
  const ctx=c.getContext('2d'); ctx.scale(dpr,dpr); el.appendChild(c);
  return {c,ctx,w,h};
}
function axes(ctx,w,h,pad,xlab,ylab){
  ctx.strokeStyle='#c9ccd6'; ctx.lineWidth=1; ctx.beginPath();
  ctx.moveTo(pad.l,pad.t); ctx.lineTo(pad.l,h-pad.b); ctx.lineTo(w-pad.r,h-pad.b); ctx.stroke();
  ctx.fillStyle='#5a6b8c'; ctx.font='12px -apple-system,Arial';
  ctx.textAlign='center'; ctx.fillText(xlab, (pad.l+w-pad.r)/2, h-6);
  ctx.save(); ctx.translate(12,(pad.t+h-pad.b)/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(ylab,0,0); ctx.restore();
}

// ---------- LIVE beat 1: the prediction cone expanding ----------
function drawCone(ctx,w,h,f,frac){
  const pad={l:54,r:16,t:16,b:34};
  const T=f.T, M=f.M, kEnd=Math.max(1,Math.round(frac*M));
  const ymin=Math.min(...f.bands.p05)*0.95, ymax=Math.max(...f.bands.p95)*1.03;
  const X=t=> pad.l + (t/T)*(w-pad.l-pad.r);
  const Y=p=> (h-pad.b) - (p-ymin)/(ymax-ymin)*(h-pad.b-pad.t);
  ctx.clearRect(0,0,w,h);
  axes(ctx,w,h,pad,'time from today  t  [years]','NOKIA.HE price  [EUR]');
  const band=(lo,hi,a)=>{ ctx.beginPath();
    for(let i=0;i<=kEnd;i++) ctx.lineTo(X(f.times[i]),Y(f.bands[hi][i]));
    for(let i=kEnd;i>=0;i--) ctx.lineTo(X(f.times[i]),Y(f.bands[lo][i]));
    ctx.closePath(); ctx.fillStyle='rgba(42,111,151,'+a+')'; ctx.fill(); };
  band('p05','p95',0.16); band('p25','p75',0.30);
  // sample paths
  ctx.strokeStyle='rgba(141,153,174,0.55)'; ctx.lineWidth=0.8;
  for(const p of f.paths){ ctx.beginPath();
    for(let i=0;i<=kEnd;i++) ctx.lineTo(X(f.times[i]),Y(p[i])); ctx.stroke(); }
  // forward path E[S_t]
  ctx.strokeStyle='#2a6f97'; ctx.lineWidth=2.4; ctx.beginPath();
  for(let i=0;i<=kEnd;i++) ctx.lineTo(X(f.times[i]),Y(f.exp_path[i])); ctx.stroke();
  // strike
  ctx.strokeStyle='#c44536'; ctx.lineWidth=1.4; ctx.setLineDash([6,5]); ctx.beginPath();
  ctx.moveTo(pad.l,Y(f.K)); ctx.lineTo(w-pad.r,Y(f.K)); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#c44536'; ctx.font='11px -apple-system,Arial'; ctx.textAlign='left';
  ctx.fillText('strike K='+f.K.toFixed(2), w-pad.r-110, Y(f.K)-5);
  // start dot
  ctx.fillStyle='#2a9d8f'; ctx.beginPath(); ctx.arc(X(0),Y(f.S0),5,0,7); ctx.fill();
}
function animateCone(el){
  const f=fc(); if(!f){ el.innerHTML='<div class="cap">forecast.json not built.</div>'; return; }
  const {ctx,w,h}=setupCanvas(el,940,420);
  const t0=performance.now(), dur=2200;
  (function step(t){ const frac=Math.min(1,(t-t0)/dur);
    drawCone(ctx,w,h,f,frac); if(frac<1) raf=requestAnimationFrame(step); })(t0);
}

// ---------- LIVE beat 4: error-vs-queries race (log-log) ----------
function drawRace(ctx,w,h,conv,frac){
  const pad={l:58,r:18,t:18,b:36};
  const all=[...conv.series.classical_mc,...conv.series.qae];
  const lx=all.map(p=>Math.log10(p.x)), ly=all.map(p=>Math.log10(p.y));
  const x0=Math.min(...lx),x1=Math.max(...lx),y0=Math.min(...ly),y1=Math.max(...ly);
  const X=x=> pad.l+(Math.log10(x)-x0)/((x1-x0)||1)*(w-pad.l-pad.r);
  const Y=y=> (h-pad.b)-(Math.log10(y)-y0)/((y1-y0)||1)*(h-pad.b-pad.t);
  ctx.clearRect(0,0,w,h);
  axes(ctx,w,h,pad,'oracle queries / samples  (log)','estimation error  ε  (log)');
  const curve=(pts,col)=>{ const k=Math.max(2,Math.round(frac*pts.length));
    ctx.strokeStyle=col; ctx.lineWidth=2.6; ctx.beginPath();
    for(let i=0;i<k;i++) ctx.lineTo(X(pts[i].x),Y(pts[i].y)); ctx.stroke();
    ctx.fillStyle=col; for(let i=0;i<k;i++){ ctx.beginPath(); ctx.arc(X(pts[i].x),Y(pts[i].y),3.4,0,7); ctx.fill(); } };
  curve(conv.series.classical_mc,'#c44536');
  curve(conv.series.qae,'#2a6f97');
  const sl=conv.slopes||{};
  ctx.font='12px -apple-system,Arial'; ctx.textAlign='left';
  ctx.fillStyle='#c44536'; ctx.fillText('Monte Carlo  slope '+(sl.classical_mc!=null?sl.classical_mc.toFixed(2):'~-0.5'), pad.l+10, pad.t+16);
  ctx.fillStyle='#2a6f97'; ctx.fillText('Amplitude Estimation  slope '+(sl.qae!=null?sl.qae.toFixed(2):'~-1.0'), pad.l+10, pad.t+34);
}
function animateRace(el){
  const conv=cv(); if(!conv||!conv.series.classical_mc.length){ el.innerHTML='<div class="cap">convergence.json not built.</div>'; return; }
  const {ctx,w,h}=setupCanvas(el,940,420);
  const t0=performance.now(), dur=2000;
  (function step(t){ const frac=Math.min(1,(t-t0)/dur);
    drawRace(ctx,w,h,conv,frac); if(frac<1) raf=requestAnimationFrame(step); })(t0);
}

// ---------- beats ----------
function hwBadge(){ const h=hw(); const done=h.status==='done';
  return '<span class="badge" style="background:'+(done?'#173':'#223')+';color:'+(done?'#7fe3b0':'#9fb0d4')+'">● '
    +(done? (h.backend+' ✓ €'+(h.price!=null?h.price.toFixed(4):'?')+' (err '+(h.abs_error!=null?h.abs_error.toFixed(4):'?')+')')
          : (h.backend+' · pending'))+'</span>'; }

const BEATS=[];
BEATS[0]=el=>{ const f=fc()||{S0:13.09}; el.innerHTML=
  '<div class="fade"><div class="kicker">Junction × OP Pohjola · Quantum Finance</div>'
 +'<h1>The madness of people is quantum</h1>'
 +'<p class="cap">Newton couldn\'t predict "the madness of people"; Feynman said classical intuition fails on the quantum world — '
 +'both say <b>markets are non-classical</b>. So we compute <i>with</i> it. Today <b>NOKIA.HE</b> sits at '
 +'<span class="num">€'+(f.S0?f.S0.toFixed(2):'13.09')+'</span> — what is a fair price for a 1-year call? '
 +'Press <kbd>→</kbd> to watch the quantum pricer answer it.</p></div>'; };

BEATS[1]=el=>{ el.innerHTML=
  '<div class="fade"><div class="kicker">Beat 1 · the prediction expands</div>'
 +'<h1 class="plain">We load every future price path into a superposition</h1>'
 +'<p class="cap">The CRR risk-neutral tree predicts the <b>whole distribution</b> of NOKIA.HE out to T=1y — '
 +'<span class="num">M</span> single-qubit rotations load all <span class="num">2^M</span> paths, free and exact. '
 +'Watch the prediction cone fan open from today\'s spot.</p>'
 +'<div class="figcard" id="cone"></div></div>';
  animateCone(document.getElementById('cone')); };

BEATS[2]=el=>{ el.innerHTML=
  '<div class="fade"><div class="kicker">Beat 2 · does it hold up?</div>'
 +'<h1 class="plain">Backtested against a year of real prices</h1>'
 +'<p class="cap">Rolling 60-day windows: the model\'s forecast (one line — <b>all four routes agree</b> on it) '
 +'tracks the realized NOKIA.HE price, which stays inside the risk-neutral cone.</p>'
 +'<div class="figcard reveal">'+img('backtest_rolling')+'</div></div>'; };

BEATS[3]=el=>{ el.innerHTML=
  '<div class="fade"><div class="kicker">Beat 3 · four implementations, one price</div>'
 +'<h1 class="plain">Every route recovers the exact price — at very different cost</h1>'
 +'<p class="cap">Classical MC, QNDM-Fourier, QNDM-QAE and the novel QSVT all hit the <b>exact-tree ground truth</b> '
 +'(left). Their circuit cost differs wildly (right): <span class="num">QAE is the shallowest (~16 CZ)</span>, QSVT the deepest.</p>'
 +'<div class="figcard reveal">'+img('model_results')+'</div></div>'; };

BEATS[4]=el=>{ el.innerHTML=
  '<div class="fade"><div class="kicker">Beat 4 · the quantum win</div>'
 +'<h1>Quadratically fewer queries to the same accuracy</h1>'
 +'<p class="cap">Error vs resource spent: Monte Carlo falls like <span class="num">1/√N</span> (slope −½); '
 +'amplitude estimation falls like <span class="num">1/queries</span> (slope −1) → the quadratic speed-up. '
 +'<b>Axis is oracle queries / samples — not wall-clock time.</b></p>'
 +'<div class="figcard" id="race"></div></div>';
  animateRace(document.getElementById('race')); };

BEATS[5]=el=>{ const r=rs(); const conv=cv();
  const gt = r? r.references.tree_price : (conv?conv.ground_truth:0);
  el.innerHTML=
  '<div class="fade"><div class="kicker">Beat 5 · the takeaway</div>'
 +'<h1>A quantum option pricer with no loading oracle</h1>'
 +'<p class="cap">Fair NOKIA.HE call price <span class="num">€'+(gt?gt.toFixed(4):'2.7752')+'</span> '
 +'(exact-tree ground truth), reproduced by every route, with amplitude estimation reaching it in '
 +'<span class="num">O(1/ε)</span> queries vs Monte Carlo\'s O(1/ε²). Real hardware next: '
 +hwBadge()+'</p>'
 +'<p class="cap" style="opacity:.7;margin-top:14px">Honesty: ground truth = exact CRR tree; the speed-up axis is queries, '
 +'not seconds; QSVT carries a small polynomial-approximation floor. Press <kbd>E</kbd> for all figures.</p></div>'; };

function renderCockpit(el){
  el.innerHTML='<div class="fade"><div class="kicker">Explore · all results</div>'
   +'<div class="grid">'
   +'<div class="panel"><div class="label">price forecast (cone + terminal)</div>'+img('price_forecast')+'</div>'
   +'<div class="panel"><div class="label">rolling backtest vs realized</div>'+img('backtest_rolling')+'</div>'
   +'<div class="panel"><div class="label">price per route + circuit cost</div>'+img('model_results')+'</div>'
   +'<div class="panel"><div class="label">error vs queries (quadratic edge)</div>'+img('error_vs_queries')+'</div>'
   +'<div class="panel"><div class="label">Hamming depth crossover</div>'+img('depth_crossover')+'</div>'
   +'<div class="panel"><div class="label">QAE scaling</div>'+img('qae_scaling')+'</div>'
   +'</div><p class="cap" style="margin-top:10px">Q50 hardware: '+hwBadge()+'</p></div>'; }

// ---------- nav ----------
function renderDots(){ const d=document.getElementById('dots'); d.innerHTML='';
  for(let i=0;i<N;i++){ const s=document.createElement('span'); if(i===BEAT&&!COCKPIT) s.className='on'; d.appendChild(s); } }
function show(){
  if(raf) cancelAnimationFrame(raf);
  document.getElementById('cockpit').classList.toggle('live',COCKPIT);
  BEATS_EL.forEach((el,i)=>el.classList.toggle('live',!COCKPIT&&i===BEAT));
  if(COCKPIT){ renderCockpit(document.getElementById('cockpit')); }
  else if(BEATS[BEAT]){ BEATS[BEAT](BEATS_EL[BEAT]); }
  renderDots();
}
function go(n){ BEAT=Math.max(0,Math.min(N-1,n)); show(); }
function toggleAutoplay(){ AUTOPLAY=!AUTOPLAY;
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; }
  if(AUTOPLAY) autoTimer=setInterval(()=>{ if(COCKPIT) return;
    if(BEAT>=N-1){ clearInterval(autoTimer); autoTimer=null; AUTOPLAY=false; } else go(BEAT+1); }, 4200); }
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='e'){ COCKPIT=!COCKPIT; show(); return; }
  if(k==='r'){ if(!COCKPIT) show(); return; }
  if(k==='p'){ toggleAutoplay(); return; }
  if(COCKPIT) return;
  if(e.key==='ArrowRight'||e.key===' '){ if(e.key===' ') e.preventDefault(); go(BEAT+1); }
  if(e.key==='ArrowLeft') go(BEAT-1);
});
if(!DATA){ const nt=document.getElementById('notice'); nt.style.display='block';
  nt.textContent='Data not baked in — run  python -m results.build_demo  to produce the self-contained demo.html.'; }
show();
</script>
</body>
</html>
